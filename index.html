<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeoRisk — Globo 3D</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060a14;--surface:#0d1220;--surface2:#111827;
      --border:#1a2535;--accent:#00d4aa;--accent2:#0088ff;
      --text:#e2e8f0;--muted:#4a6080;
      --danger:#ef4444;--warning:#f59e0b;--safe:#10b981;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden}
    .app{display:flex;flex-direction:column;height:100dvh}
    .header{
      padding:10px 18px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(13,18,32,0.95);backdrop-filter:blur(10px);flex-shrink:0;z-index:100;
    }
    .logo{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-1px}
    .logo span{color:var(--text)}
    .tagline{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:1px}
    .header-hint{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;text-align:right}
    .header-hint b{color:var(--accent);display:block}
    .main{display:flex;flex:1;overflow:hidden}
    .globe-container{flex:1;position:relative;background:radial-gradient(ellipse at 30% 40%,#0a1628 0%,#060a14 70%);overflow:hidden;touch-action:none}
    #globe-canvas{width:100%;height:100%;display:block}

    /* BOTÃO DE ANALISAR */
    .analyze-popup{
      position:absolute;z-index:20;
      background:var(--surface);border:1px solid var(--accent);
      border-radius:12px;padding:10px 14px;
      display:none;flex-direction:column;gap:6px;
      min-width:180px;box-shadow:0 0 20px rgba(0,212,170,0.2);
      pointer-events:all;
    }
    .analyze-popup.visible{display:flex}
    .popup-coords{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace}
    .popup-location{font-size:12px;font-weight:700;line-height:1.3}
    .popup-btn{
      background:var(--accent);color:#060a14;border:none;border-radius:8px;
      padding:8px 12px;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;
      cursor:pointer;transition:opacity 0.2s;text-align:center;
    }
    .popup-btn:hover{opacity:0.85}
    .popup-close{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1}

    .coords-hud{
      position:absolute;bottom:16px;left:16px;z-index:10;
      font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);
      background:rgba(13,18,32,0.8);border:1px solid var(--border);
      border-radius:8px;padding:8px 12px;backdrop-filter:blur(8px);
    }
    .coords-hud b{color:var(--accent);display:block;margin-bottom:2px}

    /* ZOOM HUD */
    .zoom-controls{
      position:absolute;bottom:16px;right:16px;z-index:10;
      display:flex;flex-direction:column;gap:4px;
    }
    .zoom-btn{
      width:36px;height:36px;background:rgba(13,18,32,0.9);
      border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:border-color 0.2s;
    }
    .zoom-btn:hover{border-color:var(--accent);color:var(--accent)}

    .click-hint{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      text-align:center;pointer-events:none;z-index:5;animation:pulse 2s ease-in-out infinite;
    }
    .click-hint .hint-icon{font-size:48px;opacity:0.15}
    .click-hint p{font-size:12px;color:var(--muted);margin-top:8px;font-family:'Space Mono',monospace}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

    .sidebar{width:360px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
    .tab{flex:1;padding:10px 6px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:0.5px}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab-content{display:none;flex:1;overflow-y:auto}
    .tab-content.active{display:flex;flex-direction:column}
    .sidebar-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;gap:12px}
    .sidebar-empty .icon{font-size:40px;opacity:0.2}
    .sidebar-empty p{color:var(--muted);font-size:12px;line-height:1.7;font-family:'Space Mono',monospace}
    .loading-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px}
    .spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:12px;color:var(--muted);text-align:center;font-family:'Space Mono',monospace;line-height:1.7}
    .result-panel{padding:16px;display:flex;flex-direction:column;gap:12px}
    .location-header{border-bottom:1px solid var(--border);padding-bottom:10px}
    .location-name{font-size:15px;font-weight:800;line-height:1.3}
    .location-coords{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:3px}
    .score-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
    .score-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
    .score-value{font-size:44px;font-weight:800;line-height:1}
    .score-value.safe{color:var(--safe)}
    .score-value.moderate{color:var(--warning)}
    .score-value.danger{color:var(--danger)}
    .score-verdict{font-size:11px;color:var(--muted);margin-top:5px}
    .section-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:7px}
    .risks-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .risk-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px}
    .risk-item-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
    .risk-item-value{font-size:12px;font-weight:600}
    .risk-item-value.low{color:var(--safe)}
    .risk-item-value.medium{color:var(--warning)}
    .risk-item-value.high{color:var(--danger)}
    .scenarios{display:flex;flex-direction:column;gap:7px}
    .scenario{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
    .scenario-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
    .scenario-name{font-size:11px;font-weight:600}
    .scenario-pct{font-size:12px;font-weight:700;font-family:'Space Mono',monospace}
    .scenario-desc{font-size:10px;color:var(--muted);line-height:1.5}
    .scenario.optimistic{border-color:#10b98133}
    .scenario.optimistic .scenario-name,.scenario.optimistic .scenario-pct{color:var(--safe)}
    .scenario.moderate2{border-color:#f59e0b33}
    .scenario.moderate2 .scenario-name,.scenario.moderate2 .scenario-pct{color:var(--warning)}
    .scenario.pessimistic{border-color:#ef444433}
    .scenario.pessimistic .scenario-name,.scenario.pessimistic .scenario-pct{color:var(--danger)}
    .verdict-box{background:var(--bg);border-radius:10px;padding:12px;border-left:3px solid var(--accent)}
    .verdict-box.no{border-left-color:var(--danger)}
    .verdict-box.maybe{border-left-color:var(--warning)}
    .verdict-box.gold{border-left-color:#fbbf24}
    .verdict-title{font-size:12px;font-weight:700;margin-bottom:5px}
    .verdict-text{font-size:11px;color:var(--muted);line-height:1.6}
    .years-control{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
    .years-control label{font-size:11px;color:var(--muted);white-space:nowrap}
    .years-control input[type=range]{flex:1;accent-color:var(--accent)}
    .years-control span{font-size:12px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace;min-width:48px;text-align:right}
    .reanalyze-btn{background:var(--accent);color:#060a14;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;width:100%;transition:opacity 0.2s}
    .reanalyze-btn:hover{opacity:0.85}
    .disaster-list{display:flex;flex-direction:column;gap:7px}
    .disaster-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;border-left:3px solid var(--danger)}
    .disaster-item.none{border-left-color:var(--safe)}
    .disaster-year{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:3px}
    .disaster-desc{font-size:11px;line-height:1.5}
    .disaster-none{font-size:11px;color:var(--safe)}
    .pol-grid{display:flex;flex-direction:column;gap:7px}
    .pol-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .pol-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;padding-top:2px}
    .pol-value{font-size:12px;font-weight:600;text-align:right;line-height:1.4}
    .learn-list{display:flex;flex-direction:column;gap:8px}
    .learn-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;border-left:3px solid var(--accent2)}
    .learn-title{font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:4px}
    .learn-text{font-size:11px;color:var(--muted);line-height:1.6}

    @media(max-width:768px){
      .main{flex-direction:column;overflow:auto}
      .globe-container{height:52dvh;flex:none}
      .sidebar{width:100%;border-left:none;border-top:1px solid var(--border);overflow:visible;flex:1}
      .tab-content.active{display:flex;flex-direction:column;min-height:300px}
      .header-hint{display:none}
      .analyze-popup{min-width:160px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="logo">GEO<span>RISK</span></div>
      <div class="tagline">Análise de Risco e Potencial de Investimento</div>
    </div>
    <div class="header-hint">
      <b>Como usar</b>
      Arraste · Scroll zoom · Clique para marcar
    </div>
  </div>
  <div class="main">
    <div class="globe-container" id="globe-container">
      <canvas id="globe-canvas"></canvas>

      <!-- POPUP DE CONFIRMAÇÃO -->
      <div class="analyze-popup" id="analyze-popup">
        <button class="popup-close" id="popup-close">✕</button>
        <div class="popup-coords" id="popup-coords">—</div>
        <div class="popup-location" id="popup-location">Carregando...</div>
        <button class="popup-btn" id="popup-btn">🔍 Analisar esta região</button>
      </div>

      <div class="click-hint" id="click-hint">
        <div class="hint-icon">🌍</div>
        <p>Arraste para girar<br>Scroll para zoom<br>Clique para marcar</p>
      </div>
      <div class="coords-hud">
        <b>Coordenadas</b>
        <span id="hud-coords">—</span>
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn" id="zoom-out">−</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="tabs" id="tabs" style="display:none">
        <div class="tab active" data-tab="riscos">Riscos</div>
        <div class="tab" data-tab="politica">Política</div>
        <div class="tab" data-tab="aprender">Aprender</div>
      </div>
      <div class="tab-content active" id="tab-riscos">
        <div class="sidebar-empty">
          <div class="icon">🌐</div>
          <p>Gire o globo e clique<br>em qualquer região<br>para marcar e analisar</p>
        </div>
      </div>
      <div class="tab-content" id="tab-politica"></div>
      <div class="tab-content" id="tab-aprender"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('globe-canvas');
const container = document.getElementById('globe-container');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
let camDist = 2.5;
camera.position.z = camDist;

const ambientLight = new THREE.AmbientLight(0x333344, 1.2);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0xffffff, 1.8);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);
const rimLight = new THREE.DirectionalLight(0x0088ff, 0.4);
rimLight.position.set(-5, -2, -3);
scene.add(rimLight);

const geo = new THREE.SphereGeometry(1, 64, 64);
const loader = new THREE.TextureLoader();
const earthTex = loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
const bumpTex = loader.load('https://unpkg.com/three-globe/example/img/earth-topology.png');
const specTex = loader.load('https://unpkg.com/three-globe/example/img/earth-water.png');
const mat = new THREE.MeshPhongMaterial({ map: earthTex, bumpMap: bumpTex, bumpScale: 0.05, specularMap: specTex, specular: new THREE.Color(0x226688), shininess: 15 });
const globe = new THREE.Mesh(geo, mat);
scene.add(globe);

const atmMat = new THREE.MeshPhongMaterial({ color: 0x0088ff, transparent: true, opacity: 0.08, side: THREE.FrontSide });
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.02, 64, 64), atmMat));

const markerMat = new THREE.MeshBasicMaterial({ color: 0x00d4aa });
const marker = new THREE.Mesh(new THREE.SphereGeometry(0.022, 16, 16), markerMat);
marker.visible = false;
scene.add(marker);

// Anel pulsante no marcador
const ringGeo = new THREE.RingGeometry(0.025, 0.035, 32);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x00d4aa, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.visible = false;
scene.add(ring);

function resize() {
  const w = container.clientWidth, h = container.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(container);

// Zoom
const MIN_DIST = 1.3, MAX_DIST = 5;
function setZoom(delta) {
  camDist = Math.max(MIN_DIST, Math.min(MAX_DIST, camDist + delta));
  camera.position.z = camDist;
}
container.addEventListener('wheel', e => { e.preventDefault(); setZoom(e.deltaY * 0.002); }, { passive: false });
document.getElementById('zoom-in').addEventListener('click', () => setZoom(-0.3));
document.getElementById('zoom-out').addEventListener('click', () => setZoom(0.3));

// Pinch zoom
let lastPinchDist = null;
container.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastPinchDist !== null) setZoom((lastPinchDist - dist) * 0.01);
    lastPinchDist = dist;
  }
}, { passive: true });
container.addEventListener('touchend', () => { lastPinchDist = null; });

// Drag
let isDragging = false, prevX = 0, prevY = 0, velX = 0, velY = 0;
let rotX = 0, rotY = 0, autoRotate = true;
let dragDistance = 0;

function getPos(e) { return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY }; }

container.addEventListener('mousedown', e => { isDragging = true; autoRotate = false; dragDistance = 0; const p = getPos(e); prevX = p.x; prevY = p.y; velX = velY = 0; });
container.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isDragging = true; autoRotate = false; dragDistance = 0; const p = getPos(e); prevX = p.x; prevY = p.y; velX = velY = 0; }
}, { passive: true });

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const p = getPos(e);
  const dx = p.x - prevX, dy = p.y - prevY;
  dragDistance += Math.abs(dx) + Math.abs(dy);
  velX = dx * 0.005; velY = dy * 0.005;
  rotY += velX; rotX += velY;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  prevX = p.x; prevY = p.y;
});
window.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  const p = getPos(e);
  const dx = p.x - prevX, dy = p.y - prevY;
  dragDistance += Math.abs(dx) + Math.abs(dy);
  velX = dx * 0.005; velY = dy * 0.005;
  rotY += velX; rotX += velY;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  prevX = p.x; prevY = p.y;
}, { passive: true });

window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('touchend', () => { isDragging = false; });

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getLatLng(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(globe);
  if (hits.length > 0) {
    const p = hits[0].point.clone();
    const inv = new THREE.Matrix4().copy(globe.matrixWorld).invert();
    p.applyMatrix4(inv).normalize();
    const lat = Math.asin(p.y) * (180 / Math.PI);
    const lng = -(Math.atan2(p.z, p.x) * (180 / Math.PI));
    return { lat, lng };
  }
  return null;
}

function placeMarker(lat, lng) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (-lng + 180) * Math.PI / 180;
  const x = -Math.sin(phi) * Math.cos(theta);
  const y = Math.cos(phi);
  const z = Math.sin(phi) * Math.sin(theta);
  marker.position.set(x, y, z);
  ring.position.set(x, y, z);
  ring.lookAt(0, 0, 0);
  marker.visible = true;
  ring.visible = true;
}

// Popup
const popup = document.getElementById('analyze-popup');
const popupCoords = document.getElementById('popup-coords');
const popupLocation = document.getElementById('popup-location');
let pendingLat = null, pendingLng = null;

document.getElementById('popup-close').addEventListener('click', () => {
  popup.classList.remove('visible');
  marker.visible = false;
  ring.visible = false;
});

canvas.addEventListener('click', async e => {
  if (dragDistance > 8) return; // era drag, não clique
  const coords = getLatLng(e.clientX, e.clientY);
  if (!coords) return;
  const { lat, lng } = coords;
  pendingLat = lat; pendingLng = lng;
  placeMarker(lat, lng);
  document.getElementById('click-hint').style.display = 'none';

  // Posiciona popup perto do clique
  const rect = container.getBoundingClientRect();
  let px = e.clientX - rect.left + 12;
  let py = e.clientY - rect.top - 60;
  if (px + 200 > rect.width) px = e.clientX - rect.left - 200;
  if (py < 0) py = e.clientY - rect.top + 12;
  popup.style.left = px + 'px';
  popup.style.top = py + 'px';
  popup.classList.add('visible');

  popupCoords.textContent = `${lat.toFixed(4)}°, ${lng.toFixed(4)}°`;
  popupLocation.textContent = 'Buscando local...';

  try {
    const loc = await reverseGeocode(lat, lng);
    popupLocation.textContent = loc;
    pendingLocation = loc;
  } catch { popupLocation.textContent = `${lat.toFixed(2)}°, ${lng.toFixed(2)}°`; pendingLocation = popupLocation.textContent; }
});

canvas.addEventListener('touchend', async e => {
  if (dragDistance > 8 || e.changedTouches.length !== 1) return;
  const t = e.changedTouches[0];
  const coords = getLatLng(t.clientX, t.clientY);
  if (!coords) return;
  const { lat, lng } = coords;
  pendingLat = lat; pendingLng = lng;
  placeMarker(lat, lng);
  document.getElementById('click-hint').style.display = 'none';

  const rect = container.getBoundingClientRect();
  let px = t.clientX - rect.left - 90;
  let py = t.clientY - rect.top - 110;
  if (py < 0) py = t.clientY - rect.top + 12;
  popup.style.left = Math.max(4, px) + 'px';
  popup.style.top = Math.max(4, py) + 'px';
  popup.classList.add('visible');

  popupCoords.textContent = `${lat.toFixed(4)}°, ${lng.toFixed(4)}°`;
  popupLocation.textContent = 'Buscando local...';
  try {
    const loc = await reverseGeocode(lat, lng);
    popupLocation.textContent = loc;
    pendingLocation = loc;
  } catch { popupLocation.textContent = `${lat.toFixed(2)}°, ${lng.toFixed(2)}°`; pendingLocation = popupLocation.textContent; }
});

let pendingLocation = '';
document.getElementById('popup-btn').addEventListener('click', () => {
  popup.classList.remove('visible');
  startAnalysis(pendingLat, pendingLng, pendingLocation);
});

// HUD hover coords
canvas.addEventListener('mousemove', e => {
  const coords = getLatLng(e.clientX, e.clientY);
  if (coords) document.getElementById('hud-coords').textContent = `${coords.lat.toFixed(2)}°, ${coords.lng.toFixed(2)}°`;
});

// Animação
let ringScale = 1, ringDir = 1;
function animate() {
  requestAnimationFrame(animate);
  if (!isDragging) {
    if (autoRotate) rotY += 0.002;
    else { velX *= 0.92; velY *= 0.92; rotY += velX; rotX += velY; }
  }
  globe.rotation.x = rotX;
  globe.rotation.y = rotY;
  marker.rotation.x = rotX;
  marker.rotation.y = rotY;
  ring.rotation.x = rotX;
  ring.rotation.y = rotY;
  // Pulsação do anel
  ringScale += 0.02 * ringDir;
  if (ringScale > 1.5 || ringScale < 1) ringDir *= -1;
  ring.scale.setScalar(ringScale);
  renderer.render(scene, camera);
}
animate();

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

let years = 30;
let currentLat, currentLng, currentLocation;

async function startAnalysis(lat, lng, location) {
  currentLat = lat; currentLng = lng; currentLocation = location;
  document.getElementById('tabs').style.display = 'flex';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="riscos"]').classList.add('active');
  document.getElementById('tab-riscos').classList.add('active');

  showLoading('tab-riscos', lat, lng);
  showLoadingSimple('tab-politica');
  showLoadingSimple('tab-aprender');

  if (window.innerWidth <= 768) document.querySelector('.sidebar').scrollIntoView({ behavior: 'smooth' });

  try {
    const data = await callBackend(lat, lng, location, years);
    renderRiscos(data, lat, lng, location);
    renderPolitica(data, location);
    renderAprender(data, location);
  } catch (err) {
    document.getElementById('tab-riscos').innerHTML = `<div class="sidebar-empty"><div class="icon">⚠️</div><p style="color:#ef4444">${err.message}</p></div>`;
  }
}

function showLoading(id, lat, lng) {
  document.getElementById(id).innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-text">Analisando região...<br>${lat.toFixed(4)}°, ${lng.toFixed(4)}°</div></div>`;
}
function showLoadingSimple(id) {
  document.getElementById(id).innerHTML = `<div class="loading-state"><div class="spinner"></div></div>`;
}

async function reverseGeocode(lat, lng) {
  const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
  const d = await r.json();
  return d.display_name?.split(',').slice(0, 2).join(',') || `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
}

async function callBackend(lat, lng, location, yrs) {
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lng, location, years: yrs })
  });
  if (!res.ok) throw new Error('Erro no servidor.');
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function riskClass(v) { return v==='Alto'?'high':v==='Médio'?'medium':'low'; }
function scoreClass(s) { return s>=70?'safe':s>=40?'moderate':'danger'; }
function verdictClass(v) {
  if (!v) return '';
  const t = v.toUpperCase();
  if (t.includes('SIM')||t.includes('ALTO')) return 'gold';
  if (t.includes('RESSALVAS')||t.includes('MÉDIO')||t.includes('MEDIO')) return 'maybe';
  return 'no';
}

function renderRiscos(a, lat, lng, location) {
  const avg = Math.round((a.scenarios.optimista.pct+a.scenarios.moderado.pct+a.scenarios.pessimista.pct)/3);
  const disasters = a.catastrofes||[];
  const disasterHTML = disasters.length===0
    ? `<div class="disaster-item none"><div class="disaster-none">Nenhuma catástrofe registrada.</div></div>`
    : disasters.map(d=>`<div class="disaster-item"><div class="disaster-year">${d.ano} · ${d.tipo}</div><div class="disaster-desc">${d.descricao}</div></div>`).join('');

  document.getElementById('tab-riscos').innerHTML = `
    <div class="result-panel">
      <div class="location-header">
        <div class="location-name">${location}</div>
        <div class="location-coords">${lat.toFixed(4)}°, ${lng.toFixed(4)}°</div>
      </div>
      <div class="score-card">
        <div class="score-label">Índice de Segurança</div>
        <div class="score-value ${scoreClass(a.score)}">${a.score}</div>
        <div class="score-verdict">${a.verdict_text}</div>
      </div>
      <div><div class="section-title">Riscos Identificados</div>
        <div class="risks-grid">
          ${Object.entries(a.risks).map(([k,v])=>`<div class="risk-item"><div class="risk-item-label">${k}</div><div class="risk-item-value ${riskClass(v)}">${v}</div></div>`).join('')}
        </div>
      </div>
      <div><div class="years-control">
        <label>Simular em</label>
        <input type="range" min="5" max="100" step="5" value="${years}" id="years-slider">
        <span id="years-val">${years} anos</span>
      </div></div>
      <div><div class="section-title">3 Cenários · média ${avg}% seguro</div>
        <div class="scenarios">
          <div class="scenario optimistic"><div class="scenario-header"><span class="scenario-name">Otimista</span><span class="scenario-pct">${a.scenarios.optimista.pct}%</span></div><div class="scenario-desc">${a.scenarios.optimista.desc}</div></div>
          <div class="scenario moderate2"><div class="scenario-header"><span class="scenario-name">Moderado</span><span class="scenario-pct">${a.scenarios.moderado.pct}%</span></div><div class="scenario-desc">${a.scenarios.moderado.desc}</div></div>
          <div class="scenario pessimistic"><div class="scenario-header"><span class="scenario-name">Pessimista</span><span class="scenario-pct">${a.scenarios.pessimista.pct}%</span></div><div class="scenario-desc">${a.scenarios.pessimista.desc}</div></div>
        </div>
      </div>
      <div><div class="section-title">Habitabilidade</div>
        <div class="verdict-box ${verdictClass(a.morar)}"><div class="verdict-title">${a.morar}</div><div class="verdict-text">${a.morar_texto}</div></div>
      </div>
      <div><div class="section-title">Potencial de Investimento</div>
        <div class="verdict-box ${verdictClass(a.investir)}"><div class="verdict-title">${a.investir||'N/A'}</div><div class="verdict-text">${a.investir_texto||'Análise indisponível.'}</div></div>
      </div>
      <div><div class="section-title">Catástrofes Registradas</div>
        <div class="disaster-list">${disasterHTML}</div>
      </div>
      <button class="reanalyze-btn" id="reanalyze-btn">Reanalisar com novos parâmetros</button>
    </div>`;

  document.getElementById('years-slider').addEventListener('input', e => {
    years = parseInt(e.target.value);
    document.getElementById('years-val').textContent = years + ' anos';
  });
  document.getElementById('reanalyze-btn').addEventListener('click', async () => {
    showLoading('tab-riscos', currentLat, currentLng);
    showLoadingSimple('tab-politica');
    showLoadingSimple('tab-aprender');
    try {
      const data = await callBackend(currentLat, currentLng, currentLocation, years);
      renderRiscos(data, currentLat, currentLng, currentLocation);
      renderPolitica(data, currentLocation);
      renderAprender(data, currentLocation);
    } catch(err) {
      document.getElementById('tab-riscos').innerHTML=`<div class="sidebar-empty"><div class="icon">⚠️</div><p style="color:#ef4444">${err.message}</p></div>`;
    }
  });
}

function renderPolitica(a, location) {
  const p = a.politica||{};
  const items = [['País',p.pais],['Capital',p.capital],['Governo',p.governo],['População',p.populacao],['PIB per capita',p.pib_per_capita],['Idioma',p.idioma],['Moeda',p.moeda],['Continente',p.continente]];
  document.getElementById('tab-politica').innerHTML = `
    <div class="result-panel">
      <div class="location-header"><div class="location-name">${location}</div><div class="location-coords">Dados Políticos e Econômicos</div></div>
      <div class="pol-grid">
        ${items.map(([l,v])=>`<div class="pol-item"><span class="pol-label">${l}</span><span class="pol-value">${v||'—'}</span></div>`).join('')}
      </div>
      ${p.contexto?`<div class="verdict-box"><div class="verdict-title">Contexto</div><div class="verdict-text">${p.contexto}</div></div>`:''}
    </div>`;
}

function renderAprender(a, location) {
  const fatos = a.aprendizado||[];
  const html = fatos.length===0
    ? `<div class="sidebar-empty"><p>Sem conteúdo disponível.</p></div>`
    : fatos.map(f=>`<div class="learn-item"><div class="learn-title">${f.titulo}</div><div class="learn-text">${f.conteudo}</div></div>`).join('');
  document.getElementById('tab-aprender').innerHTML = `
    <div class="result-panel">
      <div class="location-header"><div class="location-name">${location}</div><div class="location-coords">Aprenda sobre essa região</div></div>
      <div class="learn-list">${html}</div>
    </div>`;
}
</script>
